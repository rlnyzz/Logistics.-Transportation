version: '3.8'

services:
  logistics-transportation:
    image: ${DOCKER_REGISTRY-}logistics-transportation
    build:
      context: ./Logistics-Transportation
      dockerfile: Dockerfile
    ports:
        - "8080:8080"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: logistics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Shpak2006
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    environment:
        requirepass: DDLLogisticsRedis11
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: